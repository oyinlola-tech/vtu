<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Admin Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/login.css" />
  </head>
  <body class="app" data-page="login">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Admin Console</h1>
        <p class="muted">Secure access for operations and compliance teams.</p>
      </section>
      <section class="grid two section-gap">
        <div class="card">
          <h3>Admin Access</h3>
          <form>
            <div>
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div>
              <label>Password</label>
              <input type="password" name="password" required />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-shield"></i>
              Sign In
            </button>
          </form>
          <p class="muted"><a href="/admin/forgot-password">Forgot password?</a></p>
        </div>
        <div class="card">
          <h3>Security First</h3>
          <p class="muted">Role-based access and audit trails are enforced.</p>
          <div class="section-gap">
            <span class="pill"><i class="fa-solid fa-lock"></i> RBAC enabled</span>
          </div>
        </div>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/login.js"></script>
  </body>
</html>
