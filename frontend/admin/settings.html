<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Admin Settings</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/settings.css" />
  </head>
  <body class="app" data-page="settings">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <h3>Admin Settings</h3>
        <p class="muted">Security and session controls.</p>
        <div class="grid two section-gap">
          <a class="card" href="/admin/admins">
            <h3>Admin Management</h3>
            <p class="muted">Create and manage admin roles.</p>
          </a>
          <a class="card" href="/admin/audit">
            <h3>Audit Logs</h3>
            <p class="muted">Track sensitive actions.</p>
          </a>
          <a class="card" href="/admin/finance">
            <h3>Finance Dashboard</h3>
            <p class="muted">Revenue and balance sheet.</p>
          </a>
          <a class="card" href="/admin/monnify">
            <h3>Monnify Events</h3>
            <p class="muted">Webhook status and retries.</p>
          </a>
        </div>
        <button class="btn btn-primary section-gap" data-logout type="button">
          <i class="fa-solid fa-right-from-bracket"></i>
          Log Out
        </button>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/settings.js"></script>
  </body>
</html>
