<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Monnify Events</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/monnify.css" />
  </head>
  <body class="app" data-page="monnify">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <h3>Monnify Events</h3>
        <p class="muted">Track webhook processing status and retries.</p>
        <form class="section-gap" data-filter-form>
          <div>
            <label>Status</label>
            <select name="status">
              <option value="">Any</option>
              <option value="received">Received</option>
              <option value="processed">Processed</option>
              <option value="failed">Failed</option>
            </select>
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-filter"></i>
            Apply
          </button>
        </form>
        <table class="table section-gap">
          <thead>
            <tr>
              <th>Payment Ref</th>
              <th>Account Ref</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Attempts</th>
              <th>Last Error</th>
            </tr>
          </thead>
          <tbody data-monnify-table></tbody>
        </table>
      </section>

      <section class="card section-gap">
        <h3>Manual Retry</h3>
        <form data-retry-form>
          <div>
            <label>Payment Reference</label>
            <input type="text" name="paymentReference" required />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-rotate"></i>
            Retry Event
          </button>
        </form>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/monnify.js"></script>
  </body>
</html>
