<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Bills Management</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/bills.css" />
  </head>
  <body class="app" data-page="bills">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Bill Providers</h1>
        <p class="muted">Sync providers and control service availability.</p>
      </section>
      <section class="card section-gap">
        <h3>Bill Categories</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Code</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody data-categories></tbody>
        </table>
      </section>
      <section class="grid two section-gap">
        <div class="card">
          <h3>Add Category</h3>
          <form data-category-form>
            <div>
              <label>Code</label>
              <input type="text" name="code" required />
            </div>
            <div>
              <label>Name</label>
              <input type="text" name="name" required />
            </div>
            <div>
              <label>Description</label>
              <input type="text" name="description" required />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-plus"></i>
              Add Category
            </button>
          </form>
        </div>
        <div class="card">
          <h3>Bill Providers</h3>
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Category</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody data-providers></tbody>
          </table>
        </div>
      </section>
      <section class="card section-gap">
        <h3>Add Provider</h3>
        <form data-provider-form>
          <div>
            <label>Category ID</label>
            <input type="number" name="categoryId" required />
          </div>
          <div>
            <label>Name</label>
            <input type="text" name="name" required />
          </div>
          <div>
            <label>Code</label>
            <input type="text" name="code" required />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-plus"></i>
            Add Provider
          </button>
        </form>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/bills.js"></script>
  </body>
</html>
