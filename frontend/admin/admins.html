<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Admins</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/admins.css" />
  </head>
  <body class="app" data-page="admins">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Admin Access</h1>
        <p class="muted">Super Admins can create and manage admin roles.</p>
      </section>
      <section class="card section-gap">
        <h3>Admin Accounts</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody data-admin-table></tbody>
        </table>
      </section>

      <section class="grid two section-gap">
        <div class="card">
          <h3>Create Admin</h3>
          <form data-admin-form>
            <div>
              <label>Name</label>
              <input type="text" name="name" required />
            </div>
            <div>
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div>
              <label>Password</label>
              <input type="password" name="password" required />
            </div>
            <div>
              <label>Role</label>
              <select name="role" data-role-select></select>
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-user-plus"></i>
              Create Admin
            </button>
          </form>
        </div>
        <div class="card">
          <h3>Update Role</h3>
          <form data-role-form>
            <div>
              <label>Admin ID</label>
              <input type="text" name="adminId" required />
            </div>
            <div>
              <label>Role</label>
              <select name="role" data-role-select></select>
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-user-gear"></i>
              Update Role
            </button>
          </form>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/admins.js"></script>
  </body>
</html>
