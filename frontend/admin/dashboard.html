<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Admin Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/dashboard.css" />
  </head>
  <body class="app" data-page="dashboard">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Operations Overview</h1>
        <p class="muted">Monitor activity across Nigeria.</p>
      </section>
      <section class="grid two section-gap">
        <div class="card">
          <h3>Total Users</h3>
          <div class="balance" data-users>0</div>
        </div>
        <div class="card">
          <h3>Total Transactions</h3>
          <div class="balance" data-transactions>0</div>
        </div>
        <div class="card">
          <h3>Transaction Volume</h3>
          <div class="balance" data-volume>₦0.00</div>
        </div>
        <a class="card" href="/admin/pricing">
          <h3>Manage Pricing</h3>
          <p class="muted">Set admin markups for bill payments.</p>
        </a>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="bills" href="/admin/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/dashboard.js"></script>
  </body>
</html>
