<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="/app/admin/api" />
    <title>GLY VTU | Audit Logs</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/audit.css" />
  </head>
  <body class="app" data-page="audit">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill="currentColor" d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.63 0 6.65-2.58 7.34-6h-7.34v-3h10.7c.2 0 .36.16.36.36 0 6.07-4.93 11-11 11s-11-4.93-11-11 4.93-11 11-11c2.61 0 5.02.92 6.9 2.45l-2.4 2.4A7.44 7.44 0 0 0 12 4.5z"/></svg></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Admin Control Center</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>
          <i class="fa-solid fa-circle-half-stroke"></i>
          Appearance
        </button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-shield"></i> Audit</span>
        <h1>Audit Logs</h1>
        <p class="muted">Track sensitive actions across the platform.</p>
      </section>
      <section class="card section-gap">
        <span class="card-icon"><i class="fa-solid fa-filter"></i></span>
        <h3>Filters</h3>
        <form class="section-gap" data-filter-form>
          <div>
            <label>From</label>
            <input type="datetime-local" name="from" />
          </div>
          <div>
            <label>To</label>
            <input type="datetime-local" name="to" />
          </div>
          <div>
            <label>Actor Type</label>
            <select name="actorType">
              <option value="">Any</option>
              <option value="admin">Admin</option>
              <option value="user">User</option>
              <option value="system">System</option>
            </select>
          </div>
          <div>
            <label>Actor ID</label>
            <input type="text" name="actorId" />
          </div>
          <div>
            <label>Action</label>
            <input type="text" name="action" placeholder="e.g. admin.login" />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-filter"></i>
            Apply Filters
          </button>
        </form>
      </section>
      <section class="card section-gap">
        <span class="card-icon"><i class="fa-solid fa-clipboard-list"></i></span>
        <h3>Log Stream</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Actor</th>
              <th>Action</th>
              <th>Entity</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody data-audit-table></tbody>
        </table>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/audit.js"></script>
  </body>
</html>
