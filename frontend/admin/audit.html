<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Audit Logs</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/admin/css/audit.css" />
  </head>
  <body class="app" data-page="audit">
    <header class="topbar">
      <div class="brand">GLY VTU Admin</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Audit Logs</h1>
        <p class="muted">Track sensitive actions across the platform.</p>
      </section>
      <section class="card section-gap">
        <h3>Filters</h3>
        <form class="section-gap" data-filter-form>
          <div>
            <label>From</label>
            <input type="datetime-local" name="from" />
          </div>
          <div>
            <label>To</label>
            <input type="datetime-local" name="to" />
          </div>
          <div>
            <label>Actor Type</label>
            <select name="actorType">
              <option value="">Any</option>
              <option value="admin">Admin</option>
              <option value="user">User</option>
              <option value="system">System</option>
            </select>
          </div>
          <div>
            <label>Actor ID</label>
            <input type="text" name="actorId" />
          </div>
          <div>
            <label>Action</label>
            <input type="text" name="action" placeholder="e.g. admin.login" />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-filter"></i>
            Apply Filters
          </button>
        </form>
      </section>
      <section class="card section-gap">
        <h3>Log Stream</h3>
        <table class="table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Actor</th>
              <th>Action</th>
              <th>Entity</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody data-audit-table></tbody>
        </table>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/admin/dashboard">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
      </a>
      <a class="nav-link" data-page="finance" href="/admin/finance">
        <i class="fa-solid fa-naira-sign"></i>
        Finance
      </a>
      <a class="nav-link" data-page="users" href="/admin/users">
        <i class="fa-solid fa-users"></i>
        Users
      </a>
      <a class="nav-link" data-page="transactions" href="/admin/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/admin/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/admin/js/audit.js"></script>
  </body>
</html>
