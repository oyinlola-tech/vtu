<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Verify Device</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/verify-device.css" />
  </head>
  <body class="app" data-page="verify-device">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill="currentColor" d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.63 0 6.65-2.58 7.34-6h-7.34v-3h10.7c.2 0 .36.16.36.36 0 6.07-4.93 11-11 11s-11-4.93-11-11 4.93-11 11-11c2.61 0 5.02.92 6.9 2.45l-2.4 2.4A7.44 7.44 0 0 0 12 4.5z"/></svg></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Premium Wallet Platform</span>
        </div>
      </div>
      <div class="top-actions"></div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-shield-check"></i> Device Trust</span>
        <h1>Verify This Device</h1>
        <p class="muted">We sent a one-time code to <strong data-email>your email</strong>.</p>
      </section>
      <section class="card section-gap">
        <span class="card-icon"><i class="fa-solid fa-mobile-screen-button"></i></span>
        <form>
          <div>
            <label>OTP Code</label>
            <input type="text" name="code" inputmode="numeric" />
            <small class="muted">Enter the OTP sent to your email, or use your security question below.</small>
          </div>
          <div>
            <label>Device Label (optional)</label>
            <input type="text" name="label" placeholder="My iPhone, Office Laptop" />
          </div>
          <div class="section-gap">
            <label class="toggle">
              <input type="checkbox" data-security-alt />
              Use security question instead of OTP
            </label>
            <small class="muted">Only available if you have a security question enabled.</small>
          </div>
          <div>
            <label>Security Answer</label>
            <input type="password" name="securityAnswer" autocomplete="off" />
            <small class="muted" data-security-question-text></small>
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-shield-check"></i>
            Verify Device
          </button>
        </form>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/verify-device.js"></script>
  </body>
</html>
