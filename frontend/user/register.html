<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Register</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/register.css" />
  </head>
  <body class="app" data-page="register">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill="currentColor" d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.63 0 6.65-2.58 7.34-6h-7.34v-3h10.7c.2 0 .36.16.36.36 0 6.07-4.93 11-11 11s-11-4.93-11-11 4.93-11 11-11c2.61 0 5.02.92 6.9 2.45l-2.4 2.4A7.44 7.44 0 0 0 12 4.5z"/></svg></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Premium Wallet Platform</span>
        </div>
      </div>
      <div class="top-actions"></div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-user-plus"></i> Onboarding</span>
        <h1>Create Your Account</h1>
        <p class="muted">Open a wallet in minutes and start sending money.</p>
      </section>
      <section class="section-gap">
        <div class="card compact-auth">
          <span class="card-icon"><i class="fa-solid fa-id-badge"></i></span>
          <h3>Get Started</h3>
          <form>
            <div>
              <label>Full Name</label>
              <input type="text" name="fullName" required />
            </div>
            <div>
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div>
              <label>Phone Number</label>
              <input type="tel" name="phone" required />
            </div>
            <div>
              <label>Password</label>
              <input type="password" name="password" required />
            </div>
            <div>
              <label>BVN (or provide NIN)</label>
              <input type="text" name="bvn" />
            </div>
            <div>
              <label>NIN (or provide BVN)</label>
              <input type="text" name="nin" />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-user-plus"></i>
              Create Account
            </button>
          </form>
          <div class="benefit-row">
            <span><i class="fa-solid fa-paper-plane"></i> Free transfers</span>
            <span><i class="fa-solid fa-bolt"></i> Bills in seconds</span>
          </div>
          <div class="auth-links">
            <a href="/login">Already have an account? Sign in</a>
          </div>
          <div class="pill section-gap">
            <i class="fa-solid fa-bolt"></i>
            Bonus for new users
          </div>
        </div>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/register.js"></script>
  </body>
</html>
