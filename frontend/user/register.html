<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Register</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/register.css" />
  </head>
  <body class="app" data-page="register">
    <header class="topbar">
      <div class="brand">GLY VTU</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <h3>Create Your Account</h3>
        <p class="muted">Join Nigerians paying bills smarter.</p>
        <form>
          <div>
            <label>Full Name</label>
            <input type="text" name="fullName" required />
          </div>
          <div>
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
          <div>
            <label>Phone Number</label>
            <input type="tel" name="phone" required />
          </div>
          <div>
            <label>Password</label>
            <input type="password" name="password" required />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
          </button>
        </form>
        <p class="muted">
          Already have an account? <a href="/login">Sign in</a>
        </p>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/register.js"></script>
  </body>
</html>
