<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="/app/api" />
    <title>GLY VTU | KYC</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/kyc.css" />
  </head>
  <body class="app" data-page="kyc">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill="currentColor" d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.63 0 6.65-2.58 7.34-6h-7.34v-3h10.7c.2 0 .36.16.36.36 0 6.07-4.93 11-11 11s-11-4.93-11-11 4.93-11 11-11c2.61 0 5.02.92 6.9 2.45l-2.4 2.4A7.44 7.44 0 0 0 12 4.5z"/></svg></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Premium Wallet Platform</span>
        </div>
      </div>
      <div class="top-actions"></div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-id-card"></i> Compliance</span>
        <h1>KYC Verification</h1>
        <p class="muted">Upgrade your limits in minutes.</p>
      </section>

      <section class="section-gap">
        <h3 class="section-title">Quick Links</h3>
        <div class="grid three compact-grid">
          <a class="card compact-card" href="/wallet">
            <span class="card-icon"><i class="fa-solid fa-wallet"></i></span>
            <h3>Wallet</h3>
          </a>
          <a class="card compact-card" href="/transactions">
            <span class="card-icon"><i class="fa-solid fa-receipt"></i></span>
            <h3>History</h3>
          </a>
          <a class="card compact-card" href="/settings">
            <span class="card-icon"><i class="fa-solid fa-gear"></i></span>
            <h3>Settings</h3>
          </a>
        </div>
      </section>

      <section class="section-gap">
        <div class="card compact-auth">
          <span class="card-icon"><i class="fa-solid fa-id-card"></i></span>
          <h3>Submit Verification</h3>
          <p class="muted">Provide accurate details for faster approval.</p>
          <form>
            <div>
              <label>KYC Level</label>
              <select name="level">
                <option value="1">Level 1 - Basic</option>
                <option value="2">Level 2 - Full Verification</option>
              </select>
            </div>
            <div>
              <label>BVN</label>
              <input type="text" name="bvn" required />
            </div>
            <div>
              <label>NIN</label>
              <input type="text" name="nin" required />
            </div>
            <div>
              <label>Date of Birth</label>
              <input type="date" name="dob" required />
            </div>
            <div>
              <label>Residential Address</label>
              <input type="text" name="address" required />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-id-card"></i>
              Submit KYC
            </button>
          </form>
          <div class="pill section-gap">
            <i class="fa-solid fa-circle-check"></i>
            Higher limits after approval
          </div>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Home
      </a>
      <a class="nav-link" data-page="wallet" href="/wallet">
        <i class="fa-solid fa-wallet"></i>
        Wallet
      </a>
      <a class="nav-link" data-page="bills" href="/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/kyc.js"></script>
  </body>
</html>
