<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Reset Password</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/reset-password.css" />
  </head>
  <body class="app" data-page="reset-password">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"><i class="fa-solid fa-gem"></i></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Enterprise Wallet Suite</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>
          <i class="fa-solid fa-circle-half-stroke"></i>
          Appearance
        </button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-key"></i> Secure Reset</span>
        <h1>Set New Password</h1>
        <p class="muted">Reset code sent to <strong data-email>your email</strong>.</p>
      </section>
      <section class="card section-gap">
        <span class="card-icon"><i class="fa-solid fa-lock"></i></span>
        <form>
          <div>
            <label>OTP Code</label>
            <input type="text" name="code" inputmode="numeric" required />
          </div>
          <div>
            <label>New Password</label>
            <input type="password" name="newPassword" required />
          </div>
          <div>
            <label>Security Answer (if required)</label>
            <input type="password" name="securityAnswer" autocomplete="off" />
            <small class="muted" data-security-question-text></small>
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-lock"></i>
            Reset Password
          </button>
        </form>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/reset-password.js"></script>
  </body>
</html>
