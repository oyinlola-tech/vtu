<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Settings</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/settings.css" />
  </head>
  <body class="app" data-page="settings">
    <header class="topbar">
      <div class="brand">GLY VTU</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <h3>Account Settings</h3>
        <p class="muted">Manage your preferences and security.</p>
        <div class="grid two section-gap">
          <a class="card" href="/kyc">
            <h3>KYC Status</h3>
            <p class="muted">Review or update verification.</p>
          </a>
          <a class="card" href="/transactions">
            <h3>Transaction History</h3>
            <p class="muted">Review all bill payments.</p>
          </a>
        </div>
      </section>

      <section class="card">
        <h3>Transaction PIN</h3>
        <p class="muted">Set a PIN to authorize transfers and bill payments.</p>
        <form data-pin-setup>
          <div>
            <label>New PIN</label>
            <input type="password" name="pin" inputmode="numeric" minlength="4" maxlength="6" required />
          </div>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-key"></i>
            Create PIN
          </button>
        </form>
        <form data-pin-change hidden>
          <div>
            <label>Current PIN</label>
            <input type="password" name="currentPin" inputmode="numeric" minlength="4" maxlength="6" required />
          </div>
          <div>
            <label>New PIN</label>
            <input type="password" name="newPin" inputmode="numeric" minlength="4" maxlength="6" required />
          </div>
          <button class="btn btn-ghost" type="submit">
            <i class="fa-solid fa-rotate"></i>
            Update PIN
          </button>
        </form>
        <div class="section-gap">
          <label class="toggle">
            <input type="checkbox" data-biometric />
            Enable biometric approval (when available)
          </label>
        </div>
      </section>

      <section class="card">
        <button class="btn btn-primary section-gap" data-logout type="button">
          <i class="fa-solid fa-right-from-bracket"></i>
          Log Out
        </button>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Home
      </a>
      <a class="nav-link" data-page="wallet" href="/wallet">
        <i class="fa-solid fa-wallet"></i>
        Wallet
      </a>
      <a class="nav-link" data-page="bills" href="/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/settings.js"></script>
  </body>
</html>
