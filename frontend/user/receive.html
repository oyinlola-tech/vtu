<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Receive Money</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/receive.css" />
  </head>
  <body class="app" data-page="receive">
    <header class="topbar">
      <div class="brand">GLY VTU</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Receive Money</h1>
        <p class="muted">Share QR or account details for instant payments.</p>
      </section>

      <section class="grid two section-gap">
        <div class="card">
          <h3>Your Receive QR</h3>
          <p class="muted">Share this QR to receive transfers into your reserved account.</p>
          <div class="grid two section-gap">
            <div>
              <div class="muted">Account Number</div>
              <div data-account-number>-</div>
              <div class="muted section-gap">Bank</div>
              <div data-bank-name>-</div>
            </div>
            <div>
              <div data-qr-account></div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3>Create Request QR</h3>
          <p class="muted">Generate a payment request with amount and note.</p>
          <form>
            <div>
              <label>Amount (NGN)</label>
              <input type="number" name="amount" min="100" step="0.01" required />
            </div>
            <div>
              <label>Note</label>
              <input type="text" name="note" placeholder="School fees, airtime, etc." />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-qrcode"></i>
              Create QR
            </button>
          </form>
          <div class="section-gap" data-qr-request></div>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Home
      </a>
      <a class="nav-link" data-page="wallet" href="/wallet">
        <i class="fa-solid fa-wallet"></i>
        Wallet
      </a>
      <a class="nav-link" data-page="bills" href="/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/receive.js"></script>
  </body>
</html>
