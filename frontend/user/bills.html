<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Bills</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/bills.css" />
  </head>
  <body class="app" data-page="bills">
    <header class="topbar">
      <div class="brand">GLY VTU</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="card">
        <h3>Pay Bills</h3>
        <p class="muted">Select a service and pay instantly.</p>
        <form>
          <div>
            <label>Category</label>
            <select data-category required></select>
          </div>
          <div>
            <label>Provider</label>
            <select name="providerCode" data-provider required></select>
          </div>
          <div>
            <label>Account / Meter / Smartcard</label>
            <input type="text" name="account" required />
          </div>
          <div>
            <label>Amount (NGN)</label>
            <input type="number" name="amount" min="100" step="0.01" data-amount required />
          </div>
          <div>
            <label>Transaction PIN</label>
            <input type="password" name="pin" inputmode="numeric" minlength="4" maxlength="6" required />
          </div>
          <button class="btn btn-ghost" type="button" data-quote-btn>
            <i class="fa-solid fa-calculator"></i>
            Get Quote
          </button>
          <p class="muted" data-quote></p>
          <button class="btn btn-primary" type="submit">
            <i class="fa-solid fa-bolt"></i>
            Pay Bill
          </button>
        </form>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Home
      </a>
      <a class="nav-link" data-page="wallet" href="/wallet">
        <i class="fa-solid fa-wallet"></i>
        Wallet
      </a>
      <a class="nav-link" data-page="bills" href="/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/bills.js"></script>
  </body>
</html>
