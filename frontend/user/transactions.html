<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Activity</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/transactions.css" />
  </head>
  <body class="app" data-page="transactions">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"><i class="fa-solid fa-gem"></i></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Enterprise Wallet Suite</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>
          <i class="fa-solid fa-circle-half-stroke"></i>
          Appearance
        </button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-receipt"></i> Activity</span>
        <h1>Transaction History</h1>
        <p class="muted">All transfers and bill payments in one place.</p>
      </section>
      <section class="card section-gap">
        <span class="card-icon"><i class="fa-solid fa-list-check"></i></span>
        <h3>Latest Activity</h3>
        <p class="muted">Track status, references, settlement, and amounts.</p>
      </section>
      <section class="grid section-gap" data-transactions></section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <i class="fa-solid fa-house"></i>
        Home
      </a>
      <a class="nav-link" data-page="wallet" href="/wallet">
        <i class="fa-solid fa-wallet"></i>
        Wallet
      </a>
      <a class="nav-link" data-page="bills" href="/bills">
        <i class="fa-solid fa-bolt"></i>
        Bills
      </a>
      <a class="nav-link" data-page="transactions" href="/transactions">
        <i class="fa-solid fa-receipt"></i>
        Activity
      </a>
      <a class="nav-link" data-page="settings" href="/settings">
        <i class="fa-solid fa-gear"></i>
        Settings
      </a>
    </nav>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/transactions.js"></script>
  </body>
</html>
