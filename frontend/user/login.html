<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="" />
    <title>GLY VTU | Sign In</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="app" data-page="login">
    <header class="topbar">
      <div class="brand">GLY VTU</div>
      <div class="top-actions">
        <button class="theme-toggle" data-theme-toggle>Dark Mode</button>
      </div>
    </header>
    <main class="content">
      <section class="hero">
        <h1>Welcome Back</h1>
        <p class="muted">Sign in to manage your wallet, bills, and transfers.</p>
      </section>
      <section class="grid two section-gap">
        <div class="card">
          <h3>Secure Sign In</h3>
          <form>
            <div>
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div>
              <label>Password</label>
              <input type="password" name="password" required />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-arrow-right-to-bracket"></i>
              Sign In
            </button>
          </form>
          <p class="muted">
            Forgot password? <a href="/forgot-password">Reset here</a>
          </p>
          <p class="muted">
            New here? <a href="/register">Create an account</a>
          </p>
        </div>
        <div class="card">
          <h3>Enterprise Security</h3>
          <p class="muted">New devices require OTP verification.</p>
          <div class="section-gap">
            <span class="pill"><i class="fa-solid fa-shield-halved"></i> Device verification</span>
          </div>
          <p class="muted section-gap">
            Never share your OTP or transaction PIN with anyone.
          </p>
        </div>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
