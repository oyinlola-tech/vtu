<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base" content="/app/api" />
    <title>GLY VTU | Sign In</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="app" data-page="login">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path fill="currentColor" d="M12 4.5c-4.14 0-7.5 3.36-7.5 7.5s3.36 7.5 7.5 7.5c3.63 0 6.65-2.58 7.34-6h-7.34v-3h10.7c.2 0 .36.16.36.36 0 6.07-4.93 11-11 11s-11-4.93-11-11 4.93-11 11-11c2.61 0 5.02.92 6.9 2.45l-2.4 2.4A7.44 7.44 0 0 0 12 4.5z"/></svg></span>
        <div class="brand-text">
          <span class="brand-title">GLY VTU</span>
          <span class="brand-sub">Premium Wallet Platform</span>
        </div>
      </div>
      <div class="top-actions"></div>
    </header>
    <main class="content">
      <section class="hero">
        <span class="eyebrow"><i class="fa-solid fa-shield-halved"></i> Secure Access</span>
        <h1>Welcome Back</h1>
        <p class="muted">Sign in fast and pick up where you left off.</p>
      </section>
      <section class="section-gap">
        <div class="card compact-auth">
          <span class="card-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
          <h3>Sign In</h3>
          <form>
            <div>
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div>
              <label>Password</label>
              <input type="password" name="password" required />
            </div>
            <button class="btn btn-primary" type="submit">
              <i class="fa-solid fa-arrow-right-to-bracket"></i>
              Sign In
            </button>
          </form>
          <div class="auth-links">
            <a href="/forgot-password">Forgot password?</a>
            <a href="/register">Create account</a>
          </div>
          <div class="pill section-gap">
            <i class="fa-solid fa-shield-halved"></i>
            OTP for new devices
          </div>
        </div>
      </section>
    </main>
    <div class="overlay">
      <div class="loader"></div>
      <div data-loader-text>Loading...</div>
    </div>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
